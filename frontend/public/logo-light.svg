  <polygon points="50,8 82,22 50,36 18,22" fill="#5baaf5" stroke="#1a5fc0" stroke-width="1.5"/>
  <!-- Cap dome -->
  <ellipse cx="50" cy="35" rx="11" ry="7" fill="#7cc2f7" stroke="#1a5fc0" stroke-width="1"/>
  <!-- Tassel -->
  <line x1="18" y1="22" x2="13" y2="38" stroke="#1877F2" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="13" cy="38" r="2.5" fill="#1877F2"/>
  <line x1="11" y1="40" x2="9" y2="52" stroke="#1877F2" stroke-width="2" stroke-linecap="round"/>
  <line x1="13" y1="40" x2="13" y2="52" stroke="#1877F2" stroke-width="2" stroke-linecap="round"/>
  <line x1="15" y1="40" x2="17" y2="52" stroke="#1877F2" stroke-width="2" stroke-linecap="round"/>
  <!-- U left vertical + bottom curve -->
  <path d="M 20 36 L 20 72 Q 20 88 38 88 Q 56 88 56 72 L 56 62 L 62 62 L 62 72 Q 62 94 38 94 Q 14 94 14 72 L 14 36 Z" fill="#5baaf5"/>
  <!-- F right side vertical -->
  <rect x="56" y="36" width="7" height="52" fill="#5baaf5"/>
  <!-- F top bar -->
  <rect x="56" y="36" width="30" height="7" fill="#5baaf5"/>
  <!-- F middle bar -->
  <rect x="56" y="56" width="24" height="7" fill="#5baaf5"/>
